<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khata Kitab</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <!-- Mobile top bar (shown only below md breakpoint) -->
    <div class="md:hidden flex items-center justify-between bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-40">
        <a href="/dashboard" class="flex items-center gap-2">
            <div class="bg-emerald-600 text-white p-2 rounded-lg font-bold text-sm shadow shadow-emerald-600/10">
                <i class="fa-solid fa-wallet"></i>
            </div>
            <span class="text-lg font-bold tracking-tight text-slate-800">Khata Kitab</span>
        </a>
        <button onclick="toggleMobileMenu()" class="text-slate-700 text-2xl p-2">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <!-- Dark backdrop shown behind the sidebar when open on mobile -->
    <div id="mobileOverlay" onclick="toggleMobileMenu()" class="hidden fixed inset-0 bg-black/40 z-40 md:hidden"></div>

    <!-- Your child template pages inject their content right here -->
    {% block content %}
    {% endblock %}

    <footer class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 text-center text-gray-500 text-sm py-3 shadow-md z-50">
        Made with ❤️ by Utkarsh Rathi
    </footer>

    <script>
        function toggleMobileMenu() {
            const aside = document.querySelector('aside');
            const overlay = document.getElementById('mobileOverlay');
            if (!aside) return;

            aside.classList.toggle('hidden');
            aside.classList.toggle('flex');
            aside.classList.toggle('fixed');
            aside.classList.toggle('inset-y-0');
            aside.classList.toggle('left-0');
            aside.classList.toggle('z-50');
            aside.classList.toggle('shadow-2xl');

            overlay.classList.toggle('hidden');
        }
    </script>

</body>
</html>
