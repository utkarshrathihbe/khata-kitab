<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khata Kitab — Create Account</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-[#f8fafc] flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
        <!-- Brand Identity -->
        <div class="flex flex-col items-center mb-8">
            <div class="bg-emerald-600 text-white p-3 rounded-xl font-bold text-xl shadow-lg shadow-emerald-600/10 mb-3">
                <i class="fa-solid fa-wallet"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">Create your Khata</h1>
            <p class="text-slate-500 text-sm mt-1">Start tracking your business & personal flows</p>
        </div>

        <!-- Flash Alert Messages Section -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                <div class="mb-5 p-3.5 bg-rose-50 border border-rose-200 text-rose-700 text-xs rounded-xl flex items-center gap-2.5">
                    <i class="fa-solid fa-circle-exclamation"></i> {{ message }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Signup Form -->
        <form action="/signup" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Full Name</label>
                <div class="relative">
                    <i class="fa-regular fa-user absolute left-4 top-3.5 text-slate-400 text-sm"></i>
                    <input type="text" name="username" placeholder="e.g. Rajesh Kumar" required 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3 text-sm text-slate-800 focus:outline-none focus:border-emerald-600 focus:bg-white transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Email Address</label>
                <div class="relative">
                    <i class="fa-regular fa-envelope absolute left-4 top-3.5 text-slate-400 text-sm"></i>
                    <input type="email" name="email" placeholder="name@company.com" required 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3 text-sm text-slate-800 focus:outline-none focus:border-emerald-600 focus:bg-white transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-3.5 text-slate-400 text-sm"></i>
                    <input type="password" name="password" placeholder="••••••••" required 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3 text-sm text-slate-800 focus:outline-none focus:border-emerald-600 focus:bg-white transition-all">
                </div>
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl text-sm shadow-md shadow-emerald-600/10 cursor-pointer transition-all mt-2">
                Agree & Register
            </button>
        </form>

        <div class="border-t border-slate-100 mt-6 pt-6 text-center">
            <p class="text-sm text-slate-500">Already using Khata Kitab? <a href="/login" class="text-emerald-600 font-semibold hover:underline">Log In</a></p>
        </div>
    </div>

</body>
</html>
