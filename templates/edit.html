{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-[#f8fafc] w-full p-4">
    <div class="w-full max-w-lg bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
        <h2 class="text-2xl font-bold mb-6 text-slate-900 flex items-center gap-2">
            <i class="fa-solid fa-pen-to-square text-emerald-600"></i> Edit Transaction
        </h2>
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Date</label>
                <input type="date" name="transaction_date" value="{{ txn.transaction_date }}" required
                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-emerald-600 focus:bg-white transition-all">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Type</label>
                <select name="transaction_type"
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-emerald-600 focus:bg-white transition-all">
                    <option value="Expense" {% if txn.transaction_type == 'Expense' %}selected{% endif %}>Expense Outlay</option>
                    <option value="Income" {% if txn.transaction_type == 'Income' %}selected{% endif %}>Income Flow</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Amount (Rs.)</label>
                <input type="number" step="0.01" name="amount" value="{{ txn.amount }}" required
                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-emerald-600 focus:bg-white transition-all">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Category</label>
                <input type="text" name="category" value="{{ txn.category }}" required
                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-emerald-600 focus:bg-white transition-all">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Note</label>
                <input type="text" name="note" value="{{ txn.note or '' }}"
                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-emerald-600 focus:bg-white transition-all">
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 rounded-xl text-sm shadow-md shadow-emerald-600/10 cursor-pointer transition-all">
                    Update Transaction
                </button>
                <a href="/dashboard"
                   class="flex-1 text-center bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2.5 rounded-xl text-sm transition-all">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
