{% extends "layout.html" %}

{% block content %}

<div class="form-card" style="max-width:500px;margin:auto;">

```
<h2>Create Account</h2>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        <div style="margin-bottom:15px;color:#c0392b;">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}

<form method="POST">

    <input
        type="text"
        name="name"
        placeholder="Full Name"
        required>

    <input
        type="email"
        name="email"
        placeholder="Email Address"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <button type="submit">
        Create Account
    </button>

</form>

<p style="margin-top:20px;text-align:center;">
    Already have an account?
    <a href="/login">Login</a>
</p>
```

</div>

{% endblock %}
